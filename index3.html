<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Visualization - Maze Zone</title>
    <link rel="stylesheet" href="style2.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1><a href="index.html">Maze Zone</a></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index3.html" class="active">Visualizer</a></li>
                <li><a href="index4.html">Game</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="container">
        <div class="controls-section">
            <h2>Maze Generator</h2>
            
            <div class="control-group">
                <h3>Canvas Size</h3>
                <div class="button-grid">
                    <button class="control-btn" onclick="setCanvasSize(400, 400)">
                        <span class="btn-label">Small</span>
                        <span class="btn-size">400×400</span>
                    </button>
                    <button class="control-btn" onclick="setCanvasSize(600, 600)">
                        <span class="btn-label">Medium</span>
                        <span class="btn-size">600×600</span>
                    </button>
                    <button class="control-btn" onclick="setCanvasSize(800, 800)">
                        <span class="btn-label">Large</span>
                        <span class="btn-size">800×800</span>
                    </button>
                </div>
            </div>
            
            <div class="control-group">
                <h3>Difficulty Level</h3>
                <div class="button-grid">
                    <button class="control-btn difficulty" onclick="setMazeSize(10)">
                        <span class="btn-label">Hard</span>
                        <span class="btn-size">Complex</span>
                    </button>
                    <button class="control-btn difficulty" onclick="setMazeSize(20)">
                        <span class="btn-label">Medium</span>
                        <span class="btn-size">Balanced</span>
                    </button>
                    <button class="control-btn difficulty" onclick="setMazeSize(30)">
                        <span class="btn-label">Easy</span>
                        <span class="btn-size">Simple</span>
                    </button>
                </div>
            </div>
            
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
        
        <div class="canvas-container" id="canvas-container">
            <!-- p5.js will render canvas here -->
        </div>
    </main>
    
    <footer class="footer">
        <p>&copy; 2026 Maze Zone. All rights reserved.</p>
    </footer>
    
    <script src="mazes.js"></script>
    <script>
        function setup() {
            let container = document.getElementById('canvas-container');
            let sketch = (p) => {
                let cols, rows;
                let w = 20;
                let grid = [];
                let current;
                let stack = [];
                let canvasWidth = 600;
                let canvasHeight = 600;

                p.setup = function() {
                    let canvas = p.createCanvas(canvasWidth, canvasHeight);
                    canvas.parent('canvas-container');
                    resetMaze();
                }

                p.draw = function() {
                    p.background(147, 211, 174);
                    for (let i = 0; i < grid.length; i++) {
                        grid[i].show();
                    }
                    current.visited = true;
                    current.highlight();
                    let next = current.checkNeighbors();
                    if (next) {
                        next.visited = true;
                        stack.push(current);
                        removeWalls(current, next);
                        current = next;
                    } else if (stack.length > 0) {
                        current = stack.pop();
                    }
                }

                function resetMaze() {
                    grid = [];
                    stack = [];
                    cols = Math.floor(p.width / w);
                    rows = Math.floor(p.height / w);
                    for (let i = 0; i < cols; i++) {
                        for (let j = 0; j < rows; j++) {
                            let cell = new Cell(j, i);
                            grid.push(cell);
                        }
                    }
                    current = grid[0];
                }

                p.setMazeSize = function(size) {
                    w = size;
                    resetMaze();
                }

                p.setCanvasSize = function(width, height) {
                    canvasWidth = width;
                    canvasHeight = height;
                    p.resizeCanvas(canvasWidth, canvasHeight);
                    resetMaze();
                }

                function index(i, j) {
                    if (i < 0 || j < 0 || i > cols - 1 || j > rows - 1) {
                        return -1;
                    }
                    return i + j * cols;
                }

                class Cell {
                    constructor(i, j) {
                        this.i = i;
                        this.j = j;
                        this.walls = [true, true, true, true];
                        this.visited = false;
                    }

                    checkNeighbors() {
                        let neighbors = [];
                        let top = grid[index(this.i, this.j - 1)];
                        let right = grid[index(this.i + 1, this.j)];
                        let bottom = grid[index(this.i, this.j + 1)];
                        let left = grid[index(this.i - 1, this.j)];
                        
                        if (top && !top.visited) neighbors.push(top);
                        if (right && !right.visited) neighbors.push(right);
                        if (bottom && !bottom.visited) neighbors.push(bottom);
                        if (left && !left.visited) neighbors.push(left);
                        
                        if (neighbors.length > 0) {
                            let r = Math.floor(Math.random() * neighbors.length);
                            return neighbors[r];
                        } else {
                            return undefined;
                        }
                    }

                    highlight() {
                        let x = this.i * w;
                        let y = this.j * w;
                        p.noStroke();
                        p.fill(46, 186, 165);
                        p.rect(x, y, w, w);
                    }

                    show() {
                        let x = this.i * w;
                        let y = this.j * w;
                        p.stroke(255);
                        if (this.walls[0]) p.line(x, y, x + w, y);
                        if (this.walls[1]) p.line(x + w, y, x + w, y + w);
                        if (this.walls[2]) p.line(x + w, y + w, x, y + w);
                        if (this.walls[3]) p.line(x, y + w, x, y);
                        if (this.visited) {
                            p.noStroke();
                            p.fill(43, 186, 165);
                            p.rect(x, y, w, w);
                        }
                    }
                }

                function removeWalls(a, b) {
                    let x = a.i - b.i;
                    if (x === 1) {
                        a.walls[3] = false;
                        b.walls[1] = false;
                    } else if (x === -1) {
                        a.walls[1] = false;
                        b.walls[3] = false;
                    }
                    let y = a.j - b.j;
                    if (y === 1) {
                        a.walls[0] = false;
                        b.walls[2] = false;
                    } else if (y === -1) {
                        a.walls[2] = false;
                        b.walls[0] = false;
                    }
                }

                window.setMazeSize = (size) => p.setMazeSize(size);
                window.setCanvasSize = (width, height) => p.setCanvasSize(width, height);
            }

            new p5(sketch);
        }
    </script>
</body>
</html>
